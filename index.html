<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personnages du Roman</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #232220;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede6;
    --text2: #9e9a92;
    --text3: #5a5750;
    --accent: #c9a96e;
    --accent2: #e8c98a;
    --danger: #c96e6e;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* Header */
  header {
    padding: 2.5rem 2rem 0;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .header-left h1 em { color: var(--accent); font-style: italic; }
  .header-left p { color: var(--text2); font-size: 14px; margin-top: 6px; font-weight: 300; }
  .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  /* Search */
  .search-wrap {
    position: relative;
  }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
  #search {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 14px 9px 36px;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text3); }

  /* Buttons */
  .btn-primary {
    background: var(--accent);
    color: #1a1610;
    border: none;
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.2s, color 0.2s;
  }
  .btn-secondary:hover { background: var(--surface2); color: var(--text); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 0.5px solid rgba(201,110,110,0.3);
    border-radius: var(--radius-sm);
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: background 0.2s;
  }
  .btn-danger:hover { background: rgba(201,110,110,0.1); }

  /* Password gate */
  #gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; flex-direction: column; gap: 1.5rem;
  }
  #gate h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; color: var(--text); }
  #gate p { color: var(--text2); font-size: 14px; text-align: center; }
  #gate-form { display: flex; gap: 10px; }
  #gate-pw {
    background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    padding: 10px 16px; width: 220px; outline: none;
  }
  #gate-pw:focus { border-color: var(--accent); }
  #gate-err { color: var(--danger); font-size: 13px; display: none; }
  .lock-icon { color: var(--accent); font-size: 40px; }

  /* Divider */
  .divider {
    max-width: 1200px; margin: 2rem auto 0;
    padding: 0 2rem;
    border-bottom: 0.5px solid var(--border);
  }

  /* Grid */
  #grid-wrap { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  #count { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; font-weight: 300; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  /* Character card */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1rem;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 140px;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-2px); background: var(--surface2); }
  .avatar {
    width: 46px; height: 46px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }
  .card-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; color: var(--text); line-height: 1.2; }
  .card-role { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

  /* Add card */
  .add-card {
    background: transparent;
    border: 0.5px dashed var(--border2);
    border-radius: var(--radius);
    min-height: 140px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; cursor: pointer;
    color: var(--text3); font-size: 13px;
    transition: border-color 0.2s, color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-card:hover { border-color: var(--accent); color: var(--accent); }

  /* Empty state */
  .empty { text-align: center; padding: 4rem 0; color: var(--text3); grid-column: 1/-1; }
  .empty p { font-size: 15px; margin-top: 8px; }

  /* Modal overlay */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    display: none; align-items: flex-start; justify-content: center;
    padding: 4vh 1rem 2rem; z-index: 100; overflow-y: auto;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: 16px;
    width: 100%; max-width: 540px;
    padding: 2rem;
    position: relative;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .close-btn {
    position: absolute; top: 1.25rem; right: 1.25rem;
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: 50%; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2); transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }

  /* Modal view */
  .modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.75rem; }
  .modal-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; flex-shrink: 0; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 400; color: var(--text); }
  .modal-role { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }

  .section { margin-bottom: 1.25rem; }
  .section-label {
    font-size: 11px; color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 500; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-content { font-size: 14px; color: var(--text2); line-height: 1.7; font-weight: 300; }
  .section-content.empty-field { color: var(--text3); font-style: italic; }

  .modal-actions { display: flex; gap: 8px; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); flex-wrap: wrap; }

  /* Form */
  .form-row { margin-bottom: 1rem; }
  .form-row label { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; font-weight: 500; }
  .form-row input, .form-row textarea {
    width: 100%; background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 10px 14px; outline: none;
    transition: border-color 0.2s; font-weight: 300;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--accent); }
  .form-row textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

  .color-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; font-weight: 500; display: block; }
  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .color-dot {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: white; transform: scale(1.1); }

  /* Edit mode indicator */
  .edit-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(201,169,110,0.12); color: var(--accent);
    border: 0.5px solid rgba(201,169,110,0.3);
    border-radius: 99px; font-size: 11px; padding: 3px 10px;
    margin-bottom: 1rem; font-weight: 500;
  }

  /* Loading */
  .loading { text-align: center; padding: 4rem; color: var(--text3); grid-column: 1/-1; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  #toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm); padding: 12px 20px; font-size: 14px; color: var(--text);
    transition: transform 0.3s ease; z-index: 300; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Password gate -->
<div id="gate">
  <div class="lock-icon">🔒</div>
  <h2>Accès protégé</h2>
  <p>Ce site est réservé aux auteurs du roman.<br>Entrez le mot de passe pour continuer.</p>
  <div id="gate-form">
    <input type="password" id="gate-pw" placeholder="Mot de passe..." onkeydown="if(event.key==='Enter')checkGate()">
    <button class="btn-primary" onclick="checkGate()">Entrer</button>
  </div>
  <span id="gate-err">Mot de passe incorrect.</span>
  <p style="font-size:12px;color:var(--text3);margin-top:1rem;">Les visiteurs sans mot de passe peuvent voir les fiches en lecture seule.</p>
  <button class="btn-secondary" onclick="enterReadOnly()" style="margin-top:-0.5rem;">Continuer en lecture seule</button>
</div>

<!-- Main app (hidden until auth) -->
<div id="app" style="display:none;">
  <header>
    <div class="header-left">
      <h1>Les <em>Personnages</em></h1>
      <p id="subtitle">Fiches du roman</p>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search" placeholder="Rechercher..." oninput="renderGrid()">
      </div>
      <button class="btn-primary" id="add-btn" onclick="openAdd()" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Nouveau
      </button>
    </div>
  </header>
  <div class="divider"></div>
  <div id="grid-wrap">
    <div id="count"></div>
    <div class="grid" id="grid">
      <div class="loading"><div class="spinner"></div>Chargement des personnages...</div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal" id="modal"></div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://mddaurbgpodxdysemvnc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kZGF1cmJncG9keGR5c2Vtdm5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NTM1MzMsImV4cCI6MjA5NDUyOTUzM30.DhBLw9SXbO-vWw-_PVwHlpiIxGY5-DcDhihXDtfqFn4';
const PASSWORD = 'roman2024';

const COLORS = [
  {bg:'#2a1f3d',text:'#c4aef5',label:'violet'},
  {bg:'#1a2e28',text:'#6ecfaa',label:'émeraude'},
  {bg:'#2e1a1a',text:'#f5a0a0',label:'grenat'},
  {bg:'#2e2518',text:'#f0c878',label:'or'},
  {bg:'#1a2535',text:'#78aaee',label:'saphir'},
  {bg:'#1e2e1e',text:'#90d490',label:'forêt'},
  {bg:'#2e1e2a',text:'#e88ec8',label:'rose'},
];

let characters = [];
let isEditor = false;
let currentEditColor = 0;

function api(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + '/rest/v1/' + path, opts).then(r => r.json());
}

async function loadCharacters() {
  const data = await api('personnages?order=created_at.asc');
  characters = Array.isArray(data) ? data : [];
  renderGrid();
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function renderGrid() {
  const filter = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = characters.filter(c =>
    c.nom.toLowerCase().includes(filter) ||
    (c.role||'').toLowerCase().includes(filter)
  );
  document.getElementById('count').textContent = filtered.length + ' personnage' + (filtered.length !== 1 ? 's' : '');
  grid.innerHTML = '';
  if (filtered.length === 0 && characters.length === 0) {
    grid.innerHTML = `<div class="empty"><p>Aucun personnage pour l'instant.</p><p style="margin-top:8px;font-size:13px;">Cliquez sur "Nouveau" pour commencer !</p></div>`;
  } else if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><p>Aucun résultat pour cette recherche.</p></div>`;
  } else {
    filtered.forEach(c => {
      const col = COLORS[c.couleur || 0];
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="avatar" style="background:${col.bg};color:${col.text}">${initials(c.nom)}</div>
        <div class="card-name">${c.nom}</div>
        <div class="card-role">${c.role || ''}</div>`;
      card.onclick = () => openCard(c.id);
      grid.appendChild(card);
    });
  }
  if (isEditor) {
    const add = document.createElement('div');
    add.className = 'add-card';
    add.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg><span>Nouveau personnage</span>`;
    add.onclick = openAdd;
    grid.appendChild(add);
  }
}

function openCard(id) {
  const c = characters.find(x => x.id === id);
  const col = COLORS[c.couleur || 0];
  const actions = isEditor ? `
    <button class="btn-primary" onclick="openEdit('${id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Modifier
    </button>
    <button class="btn-danger" onclick="deleteChar('${id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      Supprimer
    </button>` : '';
  document.getElementById('modal').innerHTML = `
    <button class="close-btn" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-header">
      <div class="modal-avatar" style="background:${col.bg};color:${col.text}">${initials(c.nom)}</div>
      <div><div class="modal-name">${c.nom}</div><div class="modal-role">${c.role || ''}</div></div>
    </div>
    <div class="section">
      <div class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Physique
      </div>
      <div class="section-content ${!c.physique?'empty-field':''}">${c.physique || 'Non renseigné'}</div>
    </div>
    <div class="section">
      <div class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><circle cx="12" cy="12" r="10"/><path d="M12 17h.01"/></svg>
        Psychologie
      </div>
      <div class="section-content ${!c.psychologie?'empty-field':''}">${c.psychologie || 'Non renseigné'}</div>
    </div>
    <div class="section">
      <div class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Liens
      </div>
      <div class="section-content ${!c.liens?'empty-field':''}">${c.liens || 'Non renseigné'}</div>
    </div>
    <div class="section">
      <div class="section-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Histoire
      </div>
      <div class="section-content ${!c.histoire?'empty-field':''}">${c.histoire || 'Non renseigné'}</div>
    </div>
    ${actions ? `<div class="modal-actions">${actions}</div>` : ''}`;
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const c = characters.find(x => x.id === id);
  currentEditColor = c.couleur || 0;
  renderForm(c);
}

function openAdd() {
  currentEditColor = 0;
  renderForm(null);
}

function renderForm(c) {
  const dots = COLORS.map((col, i) =>
    `<div class="color-dot${currentEditColor===i?' selected':''}" style="background:${col.bg};border-color:${currentEditColor===i?col.text:'transparent'}" onclick="selectColor(${i})" title="${col.label}"></div>`
  ).join('');
  document.getElementById('modal').innerHTML = `
    <button class="close-btn" onclick="closeModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="edit-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      ${c ? 'Modifier le personnage' : 'Nouveau personnage'}
    </div>
    <div class="form-row"><label>Nom *</label><input id="f-nom" type="text" value="${c?c.nom:''}" placeholder="Ex: Éléonore"></div>
    <div class="form-row"><label>Rôle</label><input id="f-role" type="text" value="${c?c.role||'':''}" placeholder="Ex: Protagoniste, Antagoniste..."></div>
    <div>
      <span class="color-label">Couleur de la carte</span>
      <div class="color-picker" id="color-picker">${dots}</div>
    </div>
    <div class="form-row"><label>Physique</label><textarea id="f-physique" placeholder="Apparence, traits distinctifs...">${c?c.physique||'':''}</textarea></div>
    <div class="form-row"><label>Psychologie</label><textarea id="f-psycho" placeholder="Caractère, émotions, motivations...">${c?c.psychologie||'':''}</textarea></div>
    <div class="form-row"><label>Liens avec d'autres personnages</label><textarea id="f-liens" placeholder="Relations, alliances, conflits...">${c?c.liens||'':''}</textarea></div>
    <div class="form-row"><label>Histoire / Contexte</label><textarea id="f-histoire" placeholder="Passé, rôle dans l'histoire...">${c?c.histoire||'':''}</textarea></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveChar('${c?c.id:''}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Enregistrer
      </button>
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function selectColor(i) {
  currentEditColor = i;
  document.querySelectorAll('.color-dot').forEach((d, idx) => {
    d.classList.toggle('selected', idx === i);
    d.style.borderColor = idx === i ? COLORS[i].text : 'transparent';
  });
}

async function saveChar(id) {
  const nom = document.getElementById('f-nom').value.trim();
  if (!nom) { showToast('⚠️ Le nom est requis.'); return; }
  const data = {
    nom,
    role: document.getElementById('f-role').value.trim(),
    couleur: currentEditColor,
    physique: document.getElementById('f-physique').value.trim(),
    psychologie: document.getElementById('f-psycho').value.trim(),
    liens: document.getElementById('f-liens').value.trim(),
    histoire: document.getElementById('f-histoire').value.trim(),
  };
  if (id) {
    await api(`personnages?id=eq.${id}`, 'PATCH', data);
    const idx = characters.findIndex(c => c.id === id);
    if (idx !== -1) characters[idx] = { ...characters[idx], ...data };
    showToast('✓ Personnage modifié');
  } else {
    const result = await api('personnages', 'POST', data);
    if (Array.isArray(result) && result[0]) characters.push(result[0]);
    else await loadCharacters();
    showToast('✓ Personnage ajouté');
  }
  closeModal();
  renderGrid();
}

async function deleteChar(id) {
  if (!confirm('Supprimer ce personnage définitivement ?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/personnages?id=eq.${id}`, {
    method: 'DELETE',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
    }
  });
  characters = characters.filter(c => c.id !== id);
  closeModal();
  renderGrid();
  showToast('Personnage supprimé');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function checkGate() {
  const pw = document.getElementById('gate-pw').value;
  if (pw === PASSWORD) {
    isEditor = true;
    enterApp();
  } else {
    document.getElementById('gate-err').style.display = 'block';
    document.getElementById('gate-pw').value = '';
  }
}

function enterReadOnly() {
  isEditor = false;
  enterApp();
}

function enterApp() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('subtitle').textContent = isEditor ? 'Mode édition' : 'Lecture seule';
  if (isEditor) document.getElementById('add-btn').style.display = 'inline-flex';
  loadCharacters();
}

document.getElementById('gate-pw').addEventListener('keydown', e => { if(e.key==='Enter') checkGate(); });
</script>
</body>
</html>
